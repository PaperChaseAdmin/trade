<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Elon — PaperChase Trading Arena</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #050508;
  --panel:   #0b0b12;
  --border:  #00ffff;
  --text:    #c8d0e0;
  --dim:     #556070;
  --green:   #00ff88;
  --red:     #ff3355;
  --font:    'Courier New', monospace;
  --bot-color: #ff6b35;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: var(--font); min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,255,.015) 2px, rgba(0,255,255,.015) 4px);
  pointer-events: none; z-index: 9999;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(0,255,255,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(0,255,255,.04) 1px, transparent 1px);
  background-size: 40px 40px; pointer-events: none; z-index: 0;
}
.wrap { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }

/* Back link */
.back { display: inline-flex; align-items: center; gap: 6px; font-size: .7rem;
  letter-spacing: .12em; text-transform: uppercase; color: var(--dim);
  text-decoration: none; padding: 24px 0 32px; transition: color .2s; }
.back:hover { color: var(--border); }

/* ── Bot Hero ── */
.hero {
  border: 1px solid var(--bot-color);
  box-shadow: 0 0 30px rgba(255,107,53,.15);
  padding: 32px;
  margin-bottom: 32px;
  background: var(--panel);
}
.hero-top { display: flex; align-items: flex-start; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.hero-avatar { font-size: 3rem; line-height: 1; }
.hero-info { flex: 1; min-width: 200px; }
.hero-name { font-size: 1.8rem; letter-spacing: .1em; color: #fff; margin-bottom: 4px; }
.hero-bio  { font-size: .8rem; color: var(--dim); margin-bottom: 10px; }
.hero-strategy { font-size: .72rem; color: var(--bot-color); letter-spacing: .08em; }
.risk-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.risk-lbl { font-size: .6rem; letter-spacing: .12em; color: var(--dim); text-transform: uppercase; }
.risk-bar { width: 120px; height: 5px; background: rgba(255,255,255,.1); }
.risk-fill { height: 100%; background: var(--bot-color); }
.risk-text { font-size: .6rem; color: var(--bot-color); letter-spacing: .08em; }

/* Key metrics */
.hero-metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.metric { background: rgba(255,255,255,.03); padding: 14px 16px; border-left: 2px solid var(--bot-color); }
.metric-label { font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
.metric-val   { font-size: 1.1rem; color: #fff; }
.metric-val.pos { color: var(--green); }
.metric-val.neg { color: var(--red);   }

/* Section */
.section { margin-bottom: 36px; }
.section-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.section-head h2 { font-size: .8rem; letter-spacing: .2em; text-transform: uppercase; color: var(--border); }
.section-head::after { content: ''; flex: 1; height: 1px; background: rgba(0,255,255,.12); }

/* Chart */
.chart-wrap { background: var(--panel); border: 1px solid rgba(0,255,255,.12); padding: 20px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: .75rem; }
th { font-size: .6rem; letter-spacing: .12em; text-transform: uppercase;
     color: var(--dim); padding: 8px 12px; text-align: left;
     border-bottom: 1px solid rgba(0,255,255,.15); }
td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.04); }
tr:hover td { background: rgba(255,255,255,.02); }

.badge { display: inline-block; font-size: .6rem; letter-spacing: .08em;
  padding: 2px 7px; font-weight: bold; }
.badge-buy  { background: rgba(0,255,136,.15); color: var(--green); border: 1px solid rgba(0,255,136,.3); }
.badge-sell { background: rgba(255,51,85,.15);  color: var(--red);   border: 1px solid rgba(255,51,85,.3); }
.pos { color: var(--green); }
.neg { color: var(--red); }

/* Outlook box */
.outlook-box {
  background: var(--panel); border: 1px solid rgba(255,107,53,.3);
  padding: 16px 20px; margin-bottom: 32px;
  font-size: .78rem; line-height: 1.6; color: var(--text);
}
.outlook-label { font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; color: var(--bot-color); margin-bottom: 8px; }

/* Footer links */
.footer-links { display: flex; gap: 16px; margin-top: 40px; flex-wrap: wrap; }
.footer-link {
  font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
  padding: 8px 16px; border: 1px solid rgba(0,255,255,.2);
  color: var(--dim); text-decoration: none; transition: all .2s;
}
.footer-link:hover { color: var(--border); border-color: var(--border); }

.live-dot { display: inline-block; width: 7px; height: 7px;
  background: var(--green); border-radius: 50%; margin-right: 5px;
  box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="/trade/">← Back to Leaderboard</a>

  <div id="hero-section"></div>

  <div id="outlook-section"></div>

  <div class="section">
    <div class="section-head"><h2>📈 Portfolio Value</h2></div>
    <div class="chart-wrap"><canvas id="chart" height="90"></canvas></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>💼 Current Positions</h2></div>
    <div id="positions-section"></div>
  </div>

  <div class="section">
    <div class="section-head"><h2>🔄 Recent Trades</h2></div>
    <div id="trades-section"></div>
  </div>

  <div class="footer-links">
    <a class="footer-link" href="/trade/">← All Bots</a>
    <a class="footer-link" id="records-link" href="./records/">Full Trade Records →</a>
    <a class="footer-link" href="/market-sentinel/">📡 Market Sentinel</a>
  </div>
</div>

<script>
const BOT_ID = 'elon';
const BASE   = '../data/bots/' + BOT_ID + '/';
let portfolioChart = null;

function fmt(v) {
  return '$' + Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function signFmt(v) {
  const s = v >= 0 ? '+' : '-';
  const cls = v >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${s}${fmt(Math.abs(v))}</span>`;
}
function signPct(v) {
  const cls = v >= 0 ? 'pos' : 'neg';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
}
function timeAgo(ts) {
  const d = Math.floor((Date.now() - new Date(ts)) / 60000);
  if (d < 1) return 'just now';
  if (d < 60) return d + 'm ago';
  const h = Math.floor(d/60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h/24) + 'd ago';
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false}) + ' UTC';
}

async function load() {
  const [pf, tr] = await Promise.all([
    fetch(BASE + 'portfolio.json?t=' + Date.now()).then(r=>r.json()),
    fetch(BASE + 'trades.json?t='    + Date.now()).then(r=>r.json())
  ]);

  renderHero(pf);
  renderOutlook(pf);
  renderChart(pf);
  renderPositions(pf);
  renderTrades(tr.trades || [], pf);

  setTimeout(load, 90000);
}

function renderHero(pf) {
  const ret = pf.total_return_pct || 0;
  const retCls = ret >= 0 ? 'pos' : 'neg';
  const posCount = Object.keys(pf.positions || {}).length;

  document.getElementById('hero-section').innerHTML = `
    <div class="hero">
      <div class="hero-top">
        <div class="hero-avatar">🚀</div>
        <div class="hero-info">
          <div class="hero-name">Elon</div>
          <div class="hero-bio">High-risk tech visionary. Goes big or goes home.</div>
          <div class="hero-strategy">⚡ Aggressive momentum trading in tech, EV &amp; AI</div>
          <div class="risk-row">
            <span class="risk-lbl">Risk</span>
            <div class="risk-bar"><div class="risk-fill" style="width:90%"></div></div>
            <span class="risk-text">HIGH</span>
          </div>
        </div>
      </div>
      <div class="hero-metrics">
        <div class="metric">
          <div class="metric-label">Portfolio Value</div>
          <div class="metric-val">${fmt(pf.total_value || 0)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Total Return</div>
          <div class="metric-val ${retCls}">${ret >= 0 ? '+' : ''}${ret.toFixed(2)}%</div>
        </div>
        <div class="metric">
          <div class="metric-label">P&amp;L</div>
          <div class="metric-val">${signFmt((pf.total_value||0) - 10000)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Today</div>
          <div class="metric-val">${signFmt(pf.today_pnl || 0)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Cash</div>
          <div class="metric-val">${fmt(pf.cash || 0)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Positions</div>
          <div class="metric-val">${posCount}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Total Trades</div>
          <div class="metric-val">${pf.total_trades || 0}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Updated</div>
          <div class="metric-val" style="font-size:.75rem"><span class="live-dot"></span>${timeAgo(pf.last_updated)}</div>
        </div>
      </div>
    </div>`;
}

function renderOutlook(pf) {
  if (!pf.last_action || pf.last_action.startsWith('Initialized')) return;
  document.getElementById('outlook-section').innerHTML = `
    <div class="outlook-box">
      <div class="outlook-label">💬 Latest Market Thinking</div>
      ${pf.last_action}
    </div>`;
}

function renderChart(pf) {
  const history = (pf.portfolio_history || []).slice(-120);
  if (history.length < 2) {
    document.getElementById('chart').parentElement.innerHTML =
      '<div style="padding:30px;text-align:center;color:var(--dim);font-size:.75rem">No trading history yet — first trades will appear here</div>';
    return;
  }

  const labels = history.map(h => {
    const d = new Date(h.timestamp);
    return d.getMonth()+1 + '/' + d.getDate() + ' ' +
           String(d.getUTCHours()).padStart(2,'0') + ':' + String(d.getUTCMinutes()).padStart(2,'0');
  });
  const values = history.map(h => h.value);
  const isPos  = values[values.length-1] >= 10000;

  if (portfolioChart) portfolioChart.destroy();
  portfolioChart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: isPos ? '#00ff88' : '#ff3355',
        backgroundColor: isPos ? 'rgba(0,255,136,.06)' : 'rgba(255,51,85,.06)',
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ' $' + ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) }
      }},
      scales: {
        x: { ticks: { color:'#556070', maxTicksLimit:8, font:{family:'Courier New',size:10} }, grid: { color:'rgba(255,255,255,.04)' } },
        y: { ticks: { color:'#556070', font:{family:'Courier New',size:10},
                      callback: v => '$' + v.toLocaleString('en-US',{minimumFractionDigits:0}) },
             grid: { color:'rgba(255,255,255,.04)' } }
      }
    }
  });
}

function renderPositions(pf) {
  const pos = pf.positions || {};
  const keys = Object.keys(pos);
  const el = document.getElementById('positions-section');
  if (!keys.length) {
    el.innerHTML = '<div style="padding:20px;color:var(--dim);font-size:.75rem">No open positions — all cash</div>';
    return;
  }
  let rows = '';
  keys.forEach(ticker => {
    const p   = pos[ticker];
    const cur = p.current_price || p.avg_cost;
    const pnl = (cur - p.avg_cost) * p.shares;
    const pct = ((cur - p.avg_cost) / p.avg_cost * 100);
    rows += `<tr>
      <td>${ticker}</td>
      <td>${p.shares}</td>
      <td>${fmt(p.avg_cost)}</td>
      <td>${fmt(cur)}</td>
      <td>${fmt(p.shares * cur)}</td>
      <td>${signFmt(pnl)} <span style="font-size:.65rem">(${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)</span></td>
    </tr>`;
  });
  el.innerHTML = `<table>
    <thead><tr><th>Ticker</th><th>Shares</th><th>Avg Cost</th><th>Current</th><th>Mkt Value</th><th>Unrealised P&L</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderTrades(trades, pf) {
  const el = document.getElementById('trades-section');
  const recent = [...trades].reverse().slice(0, 10);
  if (!recent.length) {
    el.innerHTML = '<div style="padding:20px;color:var(--dim);font-size:.75rem">No trades yet — bot starts trading when the US market opens</div>';
    return;
  }
  let rows = '';
  recent.forEach(t => {
    const badge = t.action === 'BUY'
      ? '<span class="badge badge-buy">BUY</span>'
      : '<span class="badge badge-sell">SELL</span>';
    rows += `<tr>
      <td>${fmtTime(t.timestamp)}</td>
      <td>${badge}</td>
      <td>${t.ticker}</td>
      <td>${t.shares}</td>
      <td>${fmt(t.price)}</td>
      <td>${fmt(t.total_value)}</td>
      <td style="color:var(--dim);max-width:260px;font-size:.7rem">${t.reasoning || '—'}</td>
    </tr>`;
  });
  el.innerHTML = `<table>
    <thead><tr><th>Time (UTC)</th><th>Action</th><th>Ticker</th><th>Shares</th><th>Price</th><th>Total</th><th>Reasoning</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

load().catch(e => { document.body.innerHTML += '<p style="padding:40px;color:red">Error: ' + e.message + '</p>'; });
</script>
</body>
</html>
